<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Twilio Dummy API Runner</title>
    <link href="bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container py-4">
      <div class="d-flex flex-column flex-md-row align-items-start justify-content-between mb-4">
        <div>
          <h1 class="h3 mb-1">Twilio Dummy API Runner</h1>
          <p class="text-muted mb-0">Load the generated Postman collection and run each dummy Twilio endpoint from the browser.</p>
        </div>
        <div class="text-end mt-3 mt-md-0">
          <a href="/collection.json" class="btn btn-outline-secondary btn-sm">Download Collection</a>
          <a href="/health" class="btn btn-primary btn-sm">Health Check</a>
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-body">
          <h2 class="h5">Environment Variables</h2>
          <div id="variables" class="row gy-3"></div>
        </div>
      </div>

      <div id="collection-container"></div>
    </div>

    <script src="bootstrap/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
